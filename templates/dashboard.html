<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

/* 🔴 LOGOUT */
.logout {
    position: absolute;
    top: 20px;
    right: 20px;
    background: red;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 8px;
}

/* CARDS */
.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px;
}

.card {
    padding: 20px;
    border-radius: 12px;
    width: 150px;
    font-weight: bold;
}

.total { background: #222; }
.present { background: green; }
.absent { background: red; }

/* CHART */
.chart-box {
    width: 320px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
}

canvas {
    width: 300px !important;
    height: 300px !important;
}

/* TABLE */
table {
    margin: 30px auto;
    background: white;
    color: black;
    width: 80%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
}

th { background: #333; color: white; }

.status-present { background: green; color: white; padding:5px; }
.status-absent { background: red; color: white; padding:5px; }

button {
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: #222;
    color: white;
}
</style>
</head>

<body>

<!-- 🔴 LOGOUT -->
<a href="/logout">
    <button class="logout">Logout</button>
</a>

<h2>📊 Attendance Dashboard</h2>

<div class="cards">
    <div class="card total">Total<br><br>{{ present + absent }}</div>
    <div class="card present">Present<br><br>{{ present }}</div>
    <div class="card absent">Absent<br><br>{{ absent }}</div>
</div>

<div class="chart-box">
    <canvas id="chart"></canvas>
</div>

<script>
new Chart(document.getElementById('chart'), {
    type: 'pie',
    data: {
        labels: ['Present', 'Absent'],
        datasets: [{
            data: [{{ present }}, {{ absent }}],
            backgroundColor: ['green','red']
        }]
    },
    options: {
        responsive: false
    }
});
</script>

<table>
<tr>
<th>Name</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>
{% if row[3] == "Present" %}
<span class="status-present">✔ Present</span>
{% else %}
<span class="status-absent">✖ Absent</span>
{% endif %}
</td>
</tr>
{% endfor %}
</table>

<br>
<a href="/"><button>⬅ Back</button></a>

</body>
</html>
