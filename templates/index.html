<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            height: 100vh;
        }

        .box {
            margin-top: 120px;
            background: white;
            color: black;
            display: inline-block;
            padding: 30px;
            border-radius: 15px;
        }

        button {
            padding: 12px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .start { background: green; color: white; }
        .dashboard { background: blue; color: white; }

        .logout {
            position: absolute;
            top: 20px;
            right: 20px;
            background: red;
            color: white;
        }
    </style>
</head>

<body>

<!-- 🔴 LOGOUT BUTTON -->
<a href="/logout">
    <button class="logout">Logout</button>
</a>

<div class="box">
    <h2>Smart Attendance</h2>

    <a href="/start">
        <button class="start">Start Attendance</button>
    </a>

    <a href="/dashboard">
        <button class="dashboard">View Dashboard</button>
    </a>
</div>

</body>
</html>
